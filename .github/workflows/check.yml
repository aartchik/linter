name: Check
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Install deps
        run: go mod tidy
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./...